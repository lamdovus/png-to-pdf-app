<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Upload PNG to PDF</title>
</head>
<body>

<h2>Upload PNG → Convert PDF</h2>

<input type="file" id="fileInput" accept="image/png" />
<br><br>

<button onclick="upload()">Convert to PDF</button>

<script>
function upload() {
    var file = document.getElementById("fileInput").files[0];

    if (!file) {
        alert("Chọn file trước");
        return;
    }

    var formData = new FormData();
    formData.append("file", file);

    fetch("http://localhost:3000/upload-png", {
        method: "POST",
        body: formData
    })
    .then(res => res.blob())
    .then(blob => {
        var url = URL.createObjectURL(blob);

        var a = document.createElement("a");
        a.href = url;
        a.download = "card.pdf";
        a.click();
    });
}
</script>

</body>
</html>
